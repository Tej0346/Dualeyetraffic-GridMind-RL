id: dualey-hmarl-traffic-control
name: DualEye H-MARL Traffic Signal Control

description: |
  A Bangalore-specific research-grade OpenEnv environment for training and 
  evaluating AI agents on real-world traffic signal optimization.

  Features:
  - 4-directional traffic (North, South, East, West)
  - Bangalore-specific rush hour patterns (Silk Board, KR Puram, Hebbal)
  - Emergency vehicle prioritization with green wave
  - Accident mode blocking lanes temporarily
  - Upstream handoff messages between intersections
  - Dynamic weather conditions (clear, rain, fog, snow)
  - Multi-metric grading system

entrypoint: app.main:app

endpoints:
  reset: /reset
  step: /step
  state: /state

actions:
  type: string
  values:
    - GREEN_NORTH
    - GREEN_SOUTH
    - GREEN_EAST
    - GREEN_WEST
    - PRIORITY_GREEN
    - HOLD
    - RED

observation:
  type: object
  properties:
    lanes:
      type: object
      properties:
        north:
          type: object
          properties:
            vehicles: {type: integer}
            emergency: {type: boolean}
            waiting_time: {type: integer}
        south:
          type: object
          properties:
            vehicles: {type: integer}
            emergency: {type: boolean}
            waiting_time: {type: integer}
        east:
          type: object
          properties:
            vehicles: {type: integer}
            emergency: {type: boolean}
            waiting_time: {type: integer}
        west:
          type: object
          properties:
            vehicles: {type: integer}
            emergency: {type: boolean}
            waiting_time: {type: integer}
    active_signal: {type: string}
    signal_state: {type: string}
    weather: {type: string}
    time_of_day: {type: integer}
    total_vehicles: {type: integer}
    steps: {type: integer}
    task: {type: string}
    upstream_handoff:
      type: object
      properties:
        incoming_direction: {type: string}
        vehicle_count: {type: integer}
        eta_seconds: {type: integer}
        emergency_incoming: {type: boolean}
        weather: {type: string}
        time_of_day: {type: integer}

reward:
  type: float
  description: |
    Comprehensive reward including:
    - Vehicle clearance bonuses
    - Emergency handling rewards (+15)
    - Accident response
    - Congestion penalties
    - Stability bonuses
    - Bangalore rush hour multipliers

tasks:
  - name: easy
    description: Basic Bangalore traffic with low emergency frequency
    target_score: 0.75
    features:
      - 4-directional traffic
      - Basic emergencies
      - Bangalore rush hour patterns
      - Clear weather

  - name: medium
    description: Rush hour + emergencies + accidents
    target_score: 0.80
    features:
      - Increased emergency rate
      - Silk Board morning rush (3.5x)
      - KR Puram evening rush (3.0x)
      - Accident mode

  - name: hard
    description: Full Bangalore chaos with weather and gridlock risk
    target_score: 0.85
    features:
      - Dynamic weather
      - High emergency rate
      - Frequent accidents
      - Upstream handoff
      - Gridlock risk
